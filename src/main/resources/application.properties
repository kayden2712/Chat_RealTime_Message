spring.application.name=realtimemessage

# Render inject PORT env tự động (thường là 10000)
server.port=${PORT:8080}

# Spring Boot tự hiểu SPRING_DATASOURCE_URL nếu có, nếu không sẽ dùng localhost
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/realtimemessage}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret = ${JWT_SECRET:9ff75f3676fc85bc543ad597e2f9cf1481c3c36ea03cd30f3d78c2e083def1d7}
jwt.expirationInSec = 864000
jwt.refreshExpirationInSec = 864000

# Firebase
# Ưu tiên đọc từ biến môi trường base64 (dùng khi deploy Render)
# Nếu không có thì fallback về file JSON local (dùng khi dev local)
app.firebase-configuration-file = ${FIREBASE_CONFIG_FILE:serviceAccountKey.json}
app.firebase-credentials-base64 = ${FIREBASE_CREDENTIALS_BASE64:}

# Redis
# Ưu tiên REDIS_URL (Upstash format: rediss://...) nếu có
# Nếu không có, tự dựng URL từ host/port (không bao giờ để rỗng)
spring.data.redis.url=${REDIS_URL:redis://${SPRING_DATA_REDIS_HOST:localhost}:${SPRING_DATA_REDIS_PORT:6379}}
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# Spring Cache - sử dụng Redis làm backend
spring.cache.type=redis

# Actuator - expose health endpoint cho Render health check
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never