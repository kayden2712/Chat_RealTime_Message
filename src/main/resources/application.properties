spring.application.name=realtimemessage

# Spring Boot tự hiểu SPRING_DATASOURCE_URL nếu có, nếu không sẽ dùng localhost
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/realtimemessage}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret = ${JWT_SECRET:9ff75f3676fc85bc543ad597e2f9cf1481c3c36ea03cd30f3d78c2e083def1d7}
jwt.expirationInSec = 864000
jwt.refreshExpirationInSec = 864000

