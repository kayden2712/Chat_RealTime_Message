# Test configuration - overrides production settings
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Redis and Firebase auto-config for unit/integration tests (mock when needed)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# JWT test secret
jwt.secret=test-secret-key-for-unit-tests
jwt.expirationInSec=3600
jwt.refreshExpirationInSec=7200

# Logging
logging.level.com.example.realtime_message_application=DEBUG

# Activate test profile (uses in-memory implementations instead of Redis-dependent ones)
spring.profiles.active=test

# Firebase config (not loaded in test profile, but placeholder to satisfy property resolution)
app.firebase-configuration-file=serviceAccountKey.json
